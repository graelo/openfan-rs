# Tag-triggered release: build multi-platform binaries, .debs, and Docker
# images, then publish a GitHub release with provenance.
#
# Local:
#   act push -W .github/workflows/release.yml -j prepare-artifacts
#   act push -W .github/workflows/release.yml -j release

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-artifacts:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build (release)
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --locked --release --workspace --target "${TARGET}"

      - name: Stage binary and archive
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          SRC_OPENFAND="target/${TARGET}/release/openfand"
          SRC_OPENFANCTL="target/${TARGET}/release/openfanctl"

          # Standalone binaries — unversioned for stable download URLs.
          STANDALONE_OPENFAND="openfand-${TARGET}"
          STANDALONE_OPENFANCTL="openfanctl-${TARGET}"
          cp "${SRC_OPENFAND}" "${STANDALONE_OPENFAND}"
          cp "${SRC_OPENFANCTL}" "${STANDALONE_OPENFANCTL}"

          # Versioned archive — collision-free side-by-side extraction.
          PKG_DIR="openfan-${TAG}-${TARGET}"
          mkdir "${PKG_DIR}"
          cp "${SRC_OPENFAND}" "${PKG_DIR}/"
          cp "${SRC_OPENFANCTL}" "${PKG_DIR}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${PKG_DIR}/"

          ARCHIVE_FILE="${PKG_DIR}.tar.xz"
          tar -cJf "${ARCHIVE_FILE}" "${PKG_DIR}"

          {
            echo "STANDALONE_OPENFAND=${STANDALONE_OPENFAND}"
            echo "STANDALONE_OPENFANCTL=${STANDALONE_OPENFANCTL}"
            echo "ARCHIVE_FILE=${ARCHIVE_FILE}"
          } >> "${GITHUB_ENV}"

      - name: Upload – standalone (openfand)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.STANDALONE_OPENFAND }}
          path: ${{ env.STANDALONE_OPENFAND }}
          retention-days: 1

      - name: Upload – standalone (openfanctl)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.STANDALONE_OPENFANCTL }}
          path: ${{ env.STANDALONE_OPENFANCTL }}
          retention-days: 1

      - name: Upload – archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARCHIVE_FILE }}
          path: ${{ env.ARCHIVE_FILE }}
          retention-days: 1

  prepare-deb:
    name: Build Debian package
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Setup – install dpkg-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build (release)
        run: cargo build --locked --release --workspace

      - name: Package – build .deb
        env:
          ARCH: ${{ matrix.arch }}
        run: ./deploy/create-deb.sh

      - name: Upload – .deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfan-controller-${{ matrix.arch }}.deb
          path: '*.deb'
          retention-days: 1

  prepare-docker:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: graelo/openfan
          flavor: |
            suffix=-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push (per-arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  docker-manifest:
    name: Docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: prepare-docker
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: graelo/openfan
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r TAG; do
            [ -z "${TAG}" ] && continue
            echo "Creating manifest for ${TAG}"
            docker buildx imagetools create -t "${TAG}" \
              "${TAG}-amd64" \
              "${TAG}-arm64"
          done <<< "${META_TAGS}"

  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare-artifacts
      - prepare-deb
      - docker-manifest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0          # convco needs full history for the changelog
          persist-credentials: false

      - name: Install convco
        run: |
          curl -sSfLO https://github.com/convco/convco/releases/latest/download/convco-ubuntu.zip
          unzip convco-ubuntu.zip
          chmod +x convco

      - name: Generate changelog
        run: |
          ./convco changelog -c .convco --max-versions 1 > CHANGELOG.md
          rm convco convco-ubuntu.zip

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes-file CHANGELOG.md \
            --repo "${GITHUB_REPOSITORY}" \
            ./artifacts/*

      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/*'
