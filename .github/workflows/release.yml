# Tag-triggered release: build multi-platform binaries, .debs, and Docker
# images, then publish a GitHub release with provenance.
#
# Local:
#   act push -W .github/workflows/release.yml -j prepare-binaries
#   act push -W .github/workflows/release.yml -j release

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-binaries:
    name: Build artifacts
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            gh_os: linux
            gh_arch: amd64
            archive_ext: tar.xz
            suffix: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            gh_os: linux
            gh_arch: arm64
            archive_ext: tar.xz
            suffix: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            gh_os: darwin
            gh_arch: arm64
            archive_ext: zip
            suffix: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            gh_os: darwin
            gh_arch: amd64
            archive_ext: zip
            suffix: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            gh_os: windows
            gh_arch: amd64
            archive_ext: zip
            suffix: .exe
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build (release)
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --workspace --target "${TARGET}"

      - name: Package – stage binaries
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          mkdir -p "openfan-${TARGET}"
          cp "target/${TARGET}/release/openfand${SUFFIX}" "openfan-${TARGET}/"
          cp "target/${TARGET}/release/openfanctl${SUFFIX}" "openfan-${TARGET}/"
          cp README.md "openfan-${TARGET}/"
        shell: bash

      - name: Package – compress (zip)
        if: matrix.archive_ext == 'zip'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cd "openfan-${TARGET}"
          7z a "../openfan-${TARGET}.zip" ./*
        shell: bash

      - name: Package – compress (tar.xz)
        if: matrix.archive_ext == 'tar.xz'
        env:
          TARGET: ${{ matrix.target }}
        run: tar Jcf "openfan-${TARGET}.tar.xz" "openfan-${TARGET}"

      - name: Upload – archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfan-${{ matrix.target }}.${{ matrix.archive_ext }}
          path: openfan-${{ matrix.target }}.${{ matrix.archive_ext }}
          retention-days: 1

  prepare-deb:
    name: Build Debian package
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup – install dpkg-dev
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build (release)
        run: cargo build --release --workspace

      - name: Package – build .deb
        env:
          ARCH: ${{ matrix.arch }}
        run: ./deploy/create-deb.sh

      - name: Upload – .deb
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openfan-controller-${{ matrix.arch }}.deb
          path: '*.deb'
          retention-days: 1

  prepare-docker:
    name: Build Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup – extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: graelo/openfan
          flavor: |
            suffix=-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push (per-arch)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  docker-manifest:
    name: Docker multi-arch manifest
    runs-on: ubuntu-latest
    needs: prepare-docker
    environment: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: graelo/openfan
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r TAG; do
            [ -z "${TAG}" ] && continue
            echo "Creating manifest for ${TAG}"
            docker buildx imagetools create -t "${TAG}" \
              "${TAG}-amd64" \
              "${TAG}-arm64"
          done <<< "${META_TAGS}"

  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare-binaries
      - prepare-deb
      - docker-manifest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download – all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd artifacts
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            --repo "${GITHUB_REPOSITORY}" \
            ./*.tar.xz ./*.zip ./*.deb

      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/*.tar.xz,artifacts/*.zip,artifacts/*.deb'
