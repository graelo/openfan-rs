# Coverage report uploaded to codecov on pushes to main and on demand.
#
# Local:
#   act push -W .github/workflows/ci-coverage.yml

name: 'CI: Coverage'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install cargo-tarpaulin
        run: cargo install --locked cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --locked --verbose --skip-clean -p openfand -p openfan-core -p openfan-hardware --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: cobertura.xml
          fail_ci_if_error: false
