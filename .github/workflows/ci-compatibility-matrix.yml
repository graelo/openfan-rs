# Compatibility testing: multi-version and multi-platform matrix.
#
# Local:
#   act push -W .github/workflows/ci-compatibility-matrix.yml -j test-all-versions
#   act push -W .github/workflows/ci-compatibility-matrix.yml -j test-all-platforms

name: 'CI: Compatibility Matrix'

on:
  push:
    branches:
      - 'compat/*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-all-versions:
    name: ubuntu-latest (${{ matrix.rust }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        rust: ['1.91', beta, nightly]
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Quality – cargo fmt
        run: cargo fmt --all -- --check

      - name: Quality – cargo clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build (dev)
        run: cargo build --locked --workspace

      - name: Build (release)
        run: cargo build --locked --release --workspace

      - name: Install cargo-nextest
        uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # v2.75.25
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh

  test-all-platforms:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build (dev)
        run: cargo build --locked --workspace

      - name: Build (release)
        run: cargo build --locked --release --workspace

      - name: Install cargo-nextest
        uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # v2.75.25
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh
